default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: season_development

test:
  <<: *default
  database: season_test

production:
  <<: *default
  database: season_production
  username: season
  password: <%= ENV["DATABASE_PASSWORD"] %>
