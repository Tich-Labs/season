databases:
  - name: season-db
    databaseName: season
    user: season
    plan: free

services:
  - type: web
    name: season
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma"
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: season-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 1
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: RUBY_VERSION
        value: "3.4.7"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: Season <info@season.vision>
      - key: SUPPORT_EMAIL
        value: info@season.vision
      - key: APP_HOST
        value: seasonv2.onrender.com
      - key: TRELLO_EMAIL
        value: nashthecoder+hsngtakttwswmszkpwsa@boards.trello.com
