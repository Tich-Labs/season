<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Page Not Found | Season</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <link rel="icon" href="/icon.png" type="image/png">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icon.png">

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
      }

      body {
        background: #FAF7F4;
        color: #933a35;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 60px 32px 48px;
        max-width: 430px;
        margin: 0 auto;
      }

      .error-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        flex: 1;
        justify-content: center;
      }

      .error-code {
        font-size: 120px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -8px;
        margin-bottom: 20px;
      }

      .error-title {
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 1.32px;
        margin-bottom: 12px;
      }

      .error-message {
        font-size: 16px;
        font-weight: 400;
        color: #6B6B6B;
        line-height: 1.5;
        max-width: 280px;
      }

      .error-footer {
        width: 100%;
        text-align: center;
      }

      .back-link {
        display: inline-block;
        width: 322px;
        height: 52px;
        background: #933a35;
        color: #ffffff;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.66px;
        border-radius: 8px;
        border: none;
        text-decoration: none;
        line-height: 52px;
        cursor: pointer;
      }

      .back-link:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">OOPS!</h1>
      <p class="error-message">This page has moved on, like your last period. It just isn't here anymore.</p>
    </div>

    <div class="error-footer">
      <a href="/" class="back-link">Go back home</a>
    </div>
  </body>
</html>
