glob: "**/*.{html}{+*,}.erb"
exclude:
  - '**/vendor/**/*'
EnableDefaultLinters: true
linters:
  PartialInstanceVariable:
    enabled: true
  ErbSafety:
    enabled: true
    exclude:
      - 'app/views/shared/_settings_nav_row.html.erb'
      - 'app/views/shared/_settings_toggle_row.html.erb'
  Rubocop:
    enabled: false
    rubocop_config:
      inherit_from:
        - .rubocop.yml