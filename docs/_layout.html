<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.7;
      color: #333;
      background: #FAF7F4;
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #EDE1D5;
      padding: 1.5rem 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 0 1.5rem 1.5rem;
      border-bottom: 1px solid #EDE1D5;
      margin-bottom: 1rem;
    }
    .sidebar-header h1 {
      font-size: 1.25rem;
      color: #933a35;
    }
    .sidebar-header p {
      font-size: 0.8rem;
      color: #6B6B6B;
      margin-top: 0.25rem;
    }
    .nav-section {
      margin-bottom: 1rem;
    }
    .nav-section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      padding: 0 1.5rem;
      margin-bottom: 0.5rem;
    }
    .nav-item {
      display: block;
      padding: 0.5rem 1.5rem;
      color: #444;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.15s;
    }
    .nav-item:hover {
      background: #FAF7F4;
      color: #933a35;
    }
    .nav-item.active {
      background: #FDF0EE;
      color: #933a35;
      font-weight: 600;
      border-right: 3px solid #933a35;
    }
    .content {
      margin-left: 260px;
      flex: 1;
      padding: 2rem 3rem;
      max-width: 900px;
    }
    .content h1 {
      color: #933a35;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    .content h2 {
      color: #933a35;
      font-size: 1.4rem;
      margin-top: 2rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #EDE1D5;
    }
    .content h3 {
      color: #444;
      font-size: 1.1rem;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .content p { margin-bottom: 1rem; }
    .content ul, .content ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    .content li { margin-bottom: 0.25rem; }
    .content code {
      background: #EDE1D5;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: 'SF Mono', Monaco, monospace;
    }
    .content pre {
      background: #2d2d2d;
      color: #f8f8f2;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    .content pre code {
      background: none;
      padding: 0;
      color: inherit;
    }
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
    }
    .content th, .content td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid #EDE1D5;
    }
    .content th {
      background: #FAF7F4;
      font-weight: 600;
      color: #933a35;
    }
    .content a { color: #933a35; }
    .content blockquote {
      border-left: 4px solid #933a35;
      padding-left: 1rem;
      margin: 1rem 0;
      color: #6B6B6B;
      font-style: italic;
    }
    .tag {
      display: inline-block;
      background: #EDE1D5;
      color: #933a35;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-done { color: #22c55e; }
    .status-pending { color: #f59e0b; }
    .status-todo { color: #ef4444; }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .content { margin-left: 0; padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-header">
      <h1>📅 Season Docs</h1>
      <p>Internal team documentation</p>
    </div>
    
    <div class="nav-section">
      <p class="nav-section-title">Getting Started</p>
      <a href="screenslist.html" class="nav-item" data-nav="screenslist">Screens & Routes</a>
      <a href="BACKLOG.html" class="nav-item" data-nav="BACKLOG">Backlog</a>
    </div>

    <div class="nav-section">
      <p class="nav-section-title">Audit & Reports</p>
      <a href="AUDIT-2026-04-10.html" class="nav-item" data-nav="AUDIT">Audit Report</a>
      <a href="STYLING-AUDIT.html" class="nav-item" data-nav="STYLING">Styling Audit</a>
      <a href="STAKEHOLDER-REPORT-2026-04-15.html" class="nav-item" data-nav="STAKEHOLDER">Stakeholder Report</a>
    </div>

    <div class="nav-section">
      <p class="nav-section-title">Reference</p>
      <a href="userjourney.html" class="nav-item" data-nav="userjourney">User Journey</a>
      <a href="figma_nodes.html" class="nav-item" data-nav="figma_nodes">Figma Nodes</a>
      <a href="userdata.html" class="nav-item" data-nav="userdata">User Data & Privacy</a>
    </div>
  </nav>

  <main class="content">
    {{CONTENT}}
  </main>

  <script>
    // Highlight active nav item based on current page
    const currentPage = window.location.pathname.split('/').pop().replace('.html', '') || 'screenslist';
    document.querySelectorAll('.nav-item').forEach(item => {
      if (item.getAttribute('data-nav') === currentPage) {
        item.classList.add('active');
      }
    });
  </script>
</body>
</html>
